type: grid
cards:
  - type: conditional
    conditions:
      - condition: state
        entity: "12"
        state: "12"
    card:
      type: vertical-stack
      cards:
        - type: heading
          icon: mdi:information
          heading: Статусная строка
          heading_style: title
          card_mod:
            style: |
              ha-card {
                   background: rgba(200,100,0) !important;
                 }
    grid_options:
      columns: 6
      rows: auto
  - type: custom:vertical-stack-in-card
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            icon: |2-
                {% if is_state_attr(config.entity, 'shuffle', true) %} mdi:shuffle
                {% else %} mdi:shuffle-disabled
                {% endif %}
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
            entity: media_player.homepod_mini_gost
            card_mod:
              style: |
                ha-card {
                  opacity: 0.4 }   
          - type: template
            icon: |2-
                {% if is_state_attr(config.entity, 'repeat', 'all') %} mdi:repeat-variant
                {% elif is_state_attr(config.entity, 'repeat', 'one') %} mdi:repeat-once
                {% else %} mdi:repeat-off
                {% endif %}
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
            entity: media_player.homepod_mini_gost
            card_mod:
              style: |
                ha-card {
                  opacity: 0.4 }   
          - type: spacer
          - type: template
            icon: |2-
                {% if is_state_attr(config.entity, 'app_id', 'com.google.ios.youtube')%} mdi:youtube
                {% elif is_state_attr(config.entity, 'app_id', 'com.apple.AirPlay')%} mdi:cast-audio-variant
                {% elif is_state_attr(config.entity, 'app_id', 'com.apple.WatchList')%} mdi:sleep
                {% elif is_state_attr(config.entity, 'app_id', 'com.apple.Music')%} fa6-brands:itunes-note
                {% elif is_state_attr(config.entity, 'app_id', 'org.videolan.vlc-ios')%} mdi:vlc
                {% else %} mdi:sleep
                {% endif %}
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
            entity: media_player.homepod_mini_gost
            card_mod:
              style: |
                ha-card {
                  opacity: 0.4 }   
          - type: template
            icon: mdi:history
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            entity: sensor.homepod_gostinaia_trek
            card_mod:
              style: |
                ha-card {
                  opacity: 0.4 }   
                ha-card:hover {
                  opacity: 1 }     
                ha-card:active {
                  scale: 0.9;
                }  
          - type: template
            icon: mdi:information
            tap_action:
              action: more-info
            hold_action:
              action: none
            double_tap_action:
              action: none
            entity: media_player.homepod_mini_gost
            card_mod:
              style: |
                ha-card {
                  opacity: 0.4 }   
                ha-card:hover {
                  opacity: 1 }     
                ha-card:active {
                  scale: 0.9;
                }  
        alignment: start
        card_mod:
          style: |
            {% set top = 7 %}
            {% set chip_height = 48 %}
            {% include 'title_chips_scrollable.jinja' %}
    grid_options:
      columns: 6
      rows: auto
    card_mod:
      style: |
        {% set top = 100 %}
        {% include 'fixed_settings.jinja' %}
  - type: conditional
    conditions:
      - condition: state
        entity: "12"
        state: "12"
    card:
      type: vertical-stack
      cards:
        - type: heading
          icon: mdi:view-dashboard
          heading: Карта
          heading_style: title
          card_mod:
            style: |
              ha-card {
                   background: rgba(200,0,100) !important;
                 }
    grid_options:
      columns: 6
      rows: auto
  - type: custom:vertical-stack-in-card
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-template-card
            primary: |+

            secondary: ""
            icon: ""
            entity: media_player.homepod_mini_gost
            picture: ""
            badge_icon: ""
            badge_color: ""
            layout: vertical
            icon_color: ""
            tap_action:
              action: none
            double_tap_action:
              action: none
            fill_container: true
            hold_action:
              action: none
            card_mod:
              style: |
                {% set domain = 'media' %}
                {% set file = '/local/cards_img/homepod_gost.png' %}
                {% set entity = 'media_player.homepod_mini_gost' %}
                {% set state_on = 'playing' %}

                {% include 'cover_card_cover.jinja' %}
          - type: custom:mushroom-template-card
            primary: >
              {% if state_attr(config.entity,'media_title') is none or 
              state_attr(config.entity,'media_title') == ''%}  Неизвестно

              {% else%} {{state_attr(config.entity,
              'media_title')|truncate(80)}}

              {% endif %}
            secondary: >
              {% if  state_attr(config.entity,'media_artist') is none %}
              Неизвестно

              {% else%} {{state_attr(config.entity,
              'media_artist')|truncate(100)}}

              {% endif %}
            icon: ""
            entity: media_player.homepod_mini_gost
            picture: ""
            badge_icon: ""
            badge_color: ""
            layout: vertical
            icon_color: ""
            tap_action:
              action: none
            double_tap_action:
              action: none
            fill_container: true
            card_mod:
              style:
                .: |
                  {% include 'cover_device_name.jinja' %}
                mushroom-state-info$: |
                  .container {
                   --card-secondary-font-size: 15px;
                   --card-primary-font-size: 20px;
                   --card-secondary-color: rgba(var(--rgb-primary-text-color), 0.6);
                  }
          - type: conditional
            conditions:
              - condition: state
                entity: binary_sensor.stantsiia_mini_gostinaia_dlitelnost
                state: "on"
            card:
              entity: media_player.homepod_mini_gost
              tap_action: none
              hide:
                icon: true
                name: true
                runtime: true
                source: true
                power: true
                state_label: true
                volume: true
                info: true
                progress: false
                controls: true
              more_info: false
              type: custom:mini-media-player
              toggle_power: false
              group: true
              volume_stateless: false
              card_mod:
                style:
                  .: |
                    ha-card {
                      margin: 20px 20px 10px 20px;
                      height: var(--mmp-progress-height);
                      --mmp-accent-color: rgba(var(--rgb-primary-text-color),1);;
                      --ha-card-border-width: 0;
                    }
          - type: conditional
            conditions:
              - condition: state
                entity: media_player.homepod_mini_gost
                state_not: unavailable
            card:
              type: custom:mushroom-chips-card
              chips:
                - type: template
                  tap_action:
                    action: call-service
                    service: media_player.media_previous_track
                    target:
                      entity_id: media_player.homepod_mini_gost
                  icon: fas:backward-step
                  icon_color: "1"
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  card_mod:
                    style:
                      .: |
                        {% set hover = 'true' %}
                        {% set stating = 'false' %}
                        {% include 'chip_settings_style.jinja' %}
                - type: template
                  entity: media_player.yandex_station_m00en2100jayck
                  tap_action:
                    action: perform-action
                    perform_action: script.turn_on
                    target:
                      entity_id: script.homepod_play_pause_extended
                    data:
                      variables:
                        entity: media_player.homepod_mini_gost
                  icon: >-
                    {% if is_state(config.entity, 'playing') %}fas:pause  {%
                    elif is_state(config.entity, 'paused') %}fas:play  {% elif
                    is_state(config.entity, 'idle') %}fas:play {% else  %}
                    mdi:alert {% endif %}
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  card_mod:
                    style:
                      .: >
                        {% set hover = 'true' %}

                        {% set stating = 'true' %}

                        {% set color = 'rgba(120,120,120,0.1)' %}

                        {% set hover_color_off = 'rgba(120,120,120,0.2)
                        !important' %}

                        {% include 'chip_settings_style.jinja' %}
                - type: template
                  tap_action:
                    action: call-service
                    service: media_player.media_next_track
                    target:
                      entity_id: media_player.homepod_mini_gost
                  icon: fas:forward-step
                  icon_color: "1"
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  card_mod:
                    style:
                      .: |
                        {% set hover = 'true' %}
                        {% set stating = 'false' %}
                        {% include 'chip_settings_style.jinja' %}
              alignment: justify
              layout_options:
                grid_columns: full
              card_mod:
                style:
                  .: |
                    {% include 'chip_buttons_big.jinja' %}
          - type: conditional
            conditions:
              - condition: state
                entity: media_player.homepod_mini_gost
                state_not: unavailable
            card:
              type: custom:mushroom-media-player-card
              entity: media_player.homepod_mini_gost
              volume_controls:
                - volume_set
              layout: horizontal
              primary_info: none
              secondary_info: none
              icon_type: none
              card_mod:
                style:
                  mushroom-media-player-volume-control$: |
                    mushroom-slider {
                      --main-color: #505050 !important;
                      --bg-color: #50505055 !important;
                      --control-height: 25px !important;
                    }
                  .: >
                    ha-card {
                      background: transparent !important;
                      opacity: 100%;
                      margin-top: 0px;
                      border-width: 0px;
                      margin: 20px 0px 20px;
                    }



                    @media (pointer: fine) {
                      ha-card:hover {
                        background: {{(states('input_text.s_card_background_off_hover')) }};
                    }

                    @media (min-width: 1150px) {

                    ha-card {
                      margin: 20px {{space|default(150)}}px 20px  ;
                    }

                    @media (min-aspect-ratio: 1.001/1) and (max-aspect-ratio:
                    1000/1) and (max-width: 2300px), (min-aspect-ratio: 2.1/1) {

                      ha-card {
                      margin: 20px {{space|default(0)}}px 20px  ;
                      }
                    }
        grid_options:
          columns: 24
          rows: auto
    grid_options:
      columns: 6
      rows: auto
    card_mod:
      style: |
        {% set top = 160 %}
        {% include 'fixed_settings.jinja' %}
  - type: vertical-stack
    cards:
      - type: conditional
        conditions:
          - condition: state
            entity: "12"
            state: "12"
        card:
          type: vertical-stack
          cards:
            - type: heading
              icon: phu:homepod_mini_gost-mini
              heading: Бар
              heading_style: title
              card_mod:
                style: |
                  ha-card {
                       background: rgba(100,100,60) !important;
                     }
        grid_options:
          columns: 6
          rows: auto
      - type: custom:button-card
        name: null
        styles:
          card:
            - height: 100px
            - background: transparent
            - border: none
        action: none
      - type: custom:mushroom-chips-card
        chips:
          - type: back
            card_mod:
              style:
                .: |
                  {% set hover = 'true' %}
                  {% set stating = 'false' %}
                  {% include 'chip_settings_style.jinja' %}
        alignment: center
        card_mod:
          style:
            mushroom-template-chip:nth-child(1)$: |
              {% set opacity = 0 %}
              {% include 'shadow_chip_icon.jinja' %}
            mushroom-template-chip:nth-child(2)$: |
              {% set opacity = 0 %}
              {% include 'shadow_chip_icon.jinja' %}
            mushroom-template-chip:nth-child(3)$: |
              {% set opacity = 0 %}
              {% include 'shadow_chip_icon.jinja' %}
            mushroom-template-chip:nth-child(4)$: |
              {% set opacity = 0 %}
              {% include 'shadow_chip_icon.jinja' %}
            mushroom-template-chip:nth-child(5)$: |
              {% set opacity = 0 %}
              {% include 'shadow_chip_icon.jinja' %}
            mushroom-template-chip:nth-child(6)$: |
              {% set opacity = 0 %}
              {% include 'shadow_chip_icon.jinja' %}
            .: |

              {% set chip_height = 40 %}
              {% set chip_padding = 5 %}
              {% set icon_size = 30 %}
              {% set chip_spacing = 20 %}
              {% include 'fixed_bottom_bar.jinja' %}
